name: EduTrack CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Verify Flask Application
      env:
        FLASK_ENV: test
        SECRET_KEY: dummy-test-key
        DATABASE_URL: sqlite:///:memory:
      run: |
        # Verifies the app imports correctly, checking for syntax/import errors
        python -c "from app import create_app; app = create_app('test'); print('Application verified successfully!')"
